<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santa Paula Post Acute — In-Service Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<style>
  :root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);--text:#1a1a1a;--text2:#5a5a5a;--text3:#999;--accent:#1a5c3a;--accent2:#2d7a52;--accent-light:#e8f3ed;--danger:#c0392b;--danger-light:#fdf0ef;--warning:#b7660a;--warning-light:#fef6e7;--info:#1a4a7a;--info-light:#e8f0f8;--radius:8px;--radius-lg:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .app-header{background:var(--accent);color:white;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:200;}
  .app-header h1{font-size:18px;font-weight:normal;letter-spacing:0.02em;}
  .app-header p{font-size:12px;opacity:0.75;margin-top:2px;font-family:sans-serif;}
  .sticky-nav{position:sticky;top:72px;z-index:100;background:var(--bg);padding:1rem 0 0.5rem;}
  .nav{display:flex;gap:4px;background:var(--surface);border-radius:var(--radius-lg);padding:4px;border:0.5px solid var(--border);width:fit-content;}
  .nav button{font-size:13px;font-family:sans-serif;padding:7px 16px;border-radius:var(--radius);border:none;background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;}
  .nav button.active{background:var(--accent);color:white;}
  .nav button:not(.active):hover{background:var(--surface2);}
  .main{max-width:1100px;margin:0 auto;padding:0 1.5rem 1.5rem;}
  .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem;}
  .metric{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;}
  .metric .mlabel{font-size:11px;font-family:sans-serif;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
  .metric .mval{font-size:26px;color:var(--text);}
  .metric .mval.green{color:var(--accent);}
  .metric .mval.red{color:var(--danger);}
  .metric .mval.amber{color:var(--warning);}
  .dept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:10px;}
  .dept-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;}
  .dept-card:hover{border-color:var(--accent2);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
  .dept-name{font-size:14px;color:var(--text);margin-bottom:3px;}
  .dept-lead{font-size:12px;font-family:sans-serif;color:var(--text3);margin-bottom:10px;}
  .prog-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:8px;}
  .prog-fill{height:100%;border-radius:2px;background:var(--accent);}
  .dept-stats{display:flex;gap:6px;flex-wrap:wrap;}
  .badge{font-size:11px;font-family:sans-serif;padding:2px 8px;border-radius:20px;}
  .badge.compliant{background:var(--accent-light);color:var(--accent);}
  .badge.overdue{background:var(--danger-light);color:var(--danger);}
  .badge.inprog{background:var(--warning-light);color:var(--warning);}
  .badge.notstarted{background:var(--surface2);color:var(--text3);}
  .badge.na{background:var(--info-light);color:var(--info);}
  .title-badge{font-size:11px;font-family:sans-serif;padding:2px 8px;border-radius:20px;background:var(--surface2);color:var(--text2);display:inline-block;margin:2px 2px 0 0;}
  .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
  .section-head h2{font-size:16px;font-weight:normal;color:var(--text);}
  .back{font-size:13px;font-family:sans-serif;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-bottom:1rem;padding:5px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface);}
  .back:hover{background:var(--surface2);}
  .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;overflow:hidden;}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;font-family:sans-serif;}
  th{text-align:left;font-weight:500;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;padding:8px 10px;border-bottom:0.5px solid var(--border);white-space:nowrap;}
  td{padding:9px 10px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--surface2);}
  input[type="text"],input[type="date"],select,textarea{font-size:13px;font-family:sans-serif;padding:7px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);width:100%;outline:none;transition:border-color 0.15s;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent2);}
  .btn{font-size:13px;font-family:sans-serif;padding:7px 16px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s;}
  .btn:hover{background:var(--surface2);}
  .btn.primary{background:var(--accent);color:white;border-color:transparent;}
  .btn.primary:hover{background:var(--accent2);}
  .btn-sm{font-size:12px;font-family:sans-serif;padding:4px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
  .btn-sm:hover{background:var(--surface2);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
  .form-group label{font-size:11px;font-family:sans-serif;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;}
  .emp-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);}
  .emp-row:last-child{border-bottom:none;}
  .emp-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:sans-serif;font-weight:600;color:var(--accent);flex-shrink:0;margin-top:2px;}
  .emp-info{flex:1;}
  .emp-name{font-size:14px;color:var(--text);margin-bottom:3px;}
  .emp-meta{font-size:12px;font-family:sans-serif;color:var(--text2);margin-bottom:4px;}
  .emp-actions{display:flex;gap:6px;flex-shrink:0;}
  .att-entry{padding:12px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:8px;}
  .att-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
  .att-who{font-size:14px;color:var(--text);}
  .att-date{font-size:12px;font-family:sans-serif;color:var(--text3);}
  .att-dept{font-size:12px;font-family:sans-serif;color:var(--text2);margin-bottom:3px;}
  .att-item{font-size:13px;font-family:sans-serif;color:var(--text);}
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;}
  .modal{background:var(--surface);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:1.5rem;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15);}
  .modal h3{font-size:16px;font-weight:normal;margin-bottom:4px;}
  .modal .subtitle{font-size:12px;font-family:sans-serif;color:var(--text2);margin-bottom:1.25rem;}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid var(--border);}
  .filter-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
  .filter-row select,.filter-row input[type="text"]{width:auto;flex:1;min-width:160px;max-width:260px;}
  .empty{padding:2rem;text-align:center;color:var(--text3);font-family:sans-serif;font-size:13px;}
  .pct-label{font-size:11px;font-family:sans-serif;color:var(--text3);text-align:right;margin-bottom:3px;}
  .hdr-btn{font-size:13px;font-family:sans-serif;padding:7px 16px;border-radius:var(--radius);border:0.5px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);color:white;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
  .hdr-btn:hover{background:rgba(255,255,255,0.25);}
  .titles-selector{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .title-chip{font-size:12px;font-family:sans-serif;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;user-select:none;transition:all 0.1s;}
  .title-chip.selected{background:var(--accent-light);color:var(--accent);border-color:var(--accent);}
  .title-search{margin-bottom:8px;}
  @media(max-width:600px){.form-row{grid-template-columns:1fr;}.main{padding:0 1rem 1rem;}.modal{padding:1rem;}}
</style>
</head>

let state={view:'dashboard',activeDept:null,employees:[],records:{},attendance:[]};
let titleFilter=[];

function loadState(){try{const s=localStorage.getItem('spa_v2');if(s){const p=JSON.parse(s);state.employees=p.employees||[];state.records=p.records||{};state.attendance=p.attendance||[];}}catch(e){}}
function saveState(){try{localStorage.setItem('spa_v2',JSON.stringify({employees:state.employees,records:state.records,attendance:state.attendance}));}catch(e){}}
loadState();

function getRecord(id){return state.records[id]||{status:'Not Started',lastReview:'',nextDue:'',notes:'',evidence:'',owner:''};}
function setRecord(id,data){state.records[id]={...getRecord(id),...data};saveState();}
function statusBadge(s){const m={Compliant:'compliant',Overdue:'overdue','In Progress':'inprog','Not Started':'notstarted','N/A':'na'};return`<span class="badge ${m[s]||'notstarted'}">${s}</span>`;}
function getDeptStats(d){const items=ALL_ITEMS[d]||[];const c={Compliant:0,'In Progress':0,Overdue:0,'Not Started':0,'N/A':0};items.forEach(i=>{const r=getRecord(i.id);c[r.status]=(c[r.status]||0)+1;});return{total:items.length,counts:c};}
function getTotals(){let t={total:0,Compliant:0,'In Progress':0,Overdue:0,'Not Started':0};Object.keys(ALL_ITEMS).forEach(d=>{const s=getDeptStats(d);t.total+=s.total;t.Compliant+=s.counts.Compliant;t['In Progress']+=s.counts['In Progress'];t.Overdue+=s.counts.Overdue;t['Not Started']+=s.counts['Not Started'];});return t;}
function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function getTitlesArr(emp){return Array.isArray(emp.titles)?emp.titles:(emp.title?[emp.title]:[]);}
function getPrimaryDept(emp){const ts=getTitlesArr(emp);for(const t of ts){if(TITLE_DEPT[t])return TITLE_DEPT[t];}return emp.dept||'ADM';}

function navigate(view,dept=null){state.view=view;state.activeDept=dept;renderNav();renderMain();}
function renderNav(){const nav=document.getElementById('mainNav');const tabs=[{id:'dashboard',label:'Dashboard',icon:'ti-layout-dashboard'},{id:'employees',label:'Employees',icon:'ti-users'},{id:'attendance',label:'Attendance Log',icon:'ti-clipboard-list'}];nav.innerHTML=tabs.map(t=>`<button class="${state.view===t.id?'active':''}" onclick="navigate('${t.id}')"><i class="ti ${t.icon}"></i> ${t.label}</button>`).join('');}

function renderMain(){const el=document.getElementById('mainContent');if(state.view==='dashboard')el.innerHTML=renderDashboard();else if(state.view==='dept')el.innerHTML=renderDept();else if(state.view==='employees')el.innerHTML=renderEmployees();else if(state.view==='attendance')el.innerHTML=renderAttendance();}

function renderDashboard(){const t=getTotals();const pct=t.total>0?Math.round(t.Compliant/t.total*100):0;let h=`<div class="metric-grid"><div class="metric"><div class="mlabel">Total items</div><div class="mval">${t.total}</div></div><div class="metric"><div class="mlabel">Compliant</div><div class="mval green">${t.Compliant}</div></div><div class="metric"><div class="mlabel">In progress</div><div class="mval amber">${t['In Progress']}</div></div><div class="metric"><div class="mlabel">Overdue</div><div class="mval red">${t.Overdue}</div></div><div class="metric"><div class="mlabel">% compliant</div><div class="mval">${pct}%</div></div><div class="metric"><div class="mlabel">Employees</div><div class="mval">${state.employees.length}</div></div></div><div class="dept-grid">`;DEPTS.forEach(d=>{const s=getDeptStats(d.id);const p=s.total>0?Math.round(s.counts.Compliant/s.total*100):0;h+=`<div class="dept-card" onclick="navigate('dept','${d.id}')"><div class="dept-name">${d.name}</div><div class="dept-lead"><i class="ti ti-user" style="font-size:12px"></i> ${d.lead}</div><div class="pct-label">${p}%</div><div class="prog-bar"><div class="prog-fill" style="width:${p}%"></div></div><div class="dept-stats"><span class="badge compliant">${s.counts.Compliant} compliant</span>${s.counts['In Progress']>0?`<span class="badge inprog">${s.counts['In Progress']} in progress</span>`:''}${s.counts.Overdue>0?`<span class="badge overdue">${s.counts.Overdue} overdue</span>`:''}<span class="badge notstarted">${s.counts['Not Started']} not started</span></div></div>`;});return h+'</div>';}

function renderDept(){const d=DEPTS.find(x=>x.id===state.activeDept);if(!d)return'';const items=ALL_ITEMS[d.id]||[];let h=`<button class="back" onclick="navigate('dashboard')"><i class="ti ti-arrow-left"></i> Back to dashboard</button><div class="section-head"><h2>${d.name} &mdash; ${items.length} items</h2></div><div class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>Category</th><th>Item</th><th>Frequency</th><th>Status</th><th>Last review</th><th>Next due</th><th></th></tr></thead><tbody>`;items.forEach(i=>{const r=getRecord(i.id);h+=`<tr><td style="font-size:11px;color:var(--text3);white-space:nowrap">${i.id}</td><td style="font-size:12px;color:var(--text2);white-space:nowrap">${i.cat}</td><td style="min-width:200px">${i.item}</td><td style="font-size:12px;white-space:nowrap">${i.freq}</td><td>${statusBadge(r.status)}</td><td style="font-size:12px;white-space:nowrap">${r.lastReview||'&mdash;'}</td><td style="font-size:12px;white-space:nowrap">${r.nextDue||'&mdash;'}</td><td><button class="btn-sm" onclick="openItemModal('${i.id}')"><i class="ti ti-edit"></i> Update</button></td></tr>`;});return h+'</tbody></table></div></div>';}

function renderEmployees(){
  const fD=document.getElementById('deptF')?.value||'';
  const search=(document.getElementById('empSearch')?.value||'').toLowerCase();
  let emps=state.employees.filter(e=>{
    const ts=getTitlesArr(e);
    const dept=getPrimaryDept(e);
    const matchDept=!fD||dept===fD;
    const matchSearch=!search||e.name.toLowerCase().includes(search);
    return matchDept&&matchSearch;
  });
  let h=`<div class="section-head"><h2>Employees (${state.employees.length})</h2></div>
  <div class="filter-row">
    <input type="text" id="empSearch" placeholder="Search by name..." value="${document.getElementById('empSearch')?.value||''}" oninput="renderMain()" style="max-width:200px">
    <select id="deptF" onchange="renderMain()"><option value="">All departments</option>${DEPTS.map(d=>`<option value="${d.id}"${fD===d.id?' selected':''}>${d.name}</option>`).join('')}</select>
  </div><div class="card">`;
  if(emps.length===0){h+=`<div class="empty"><i class="ti ti-users" style="font-size:32px;display:block;margin-bottom:8px;opacity:0.3"></i>No employees found.</div>`;}
  emps.forEach(e=>{
    const idx=state.employees.indexOf(e);
    const dept=DEPTS.find(d=>d.id===getPrimaryDept(e));
    const ts=getTitlesArr(e);
    h+=`<div class="emp-row">
      <div class="emp-avatar">${initials(e.name)}</div>
      <div class="emp-info">
        <div class="emp-name">${e.name}</div>
        <div class="emp-meta">${dept?dept.name:''} ${e.pin?'&middot; PIN: '+e.pin:''}</div>
        <div>${ts.map(t=>`<span class="title-badge">${t}</span>`).join('')}</div>
      </div>
      <div class="emp-actions">
        <button class="btn-sm" onclick="openAttendanceModal(${idx})"><i class="ti ti-clipboard-check"></i> Log</button>
        <button class="btn-sm" onclick="openEditEmployeeModal(${idx})"><i class="ti ti-edit"></i> Edit</button>
        <button class="btn-sm" onclick="removeEmployee(${idx})" style="color:var(--danger)"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  });
  return h+'</div>';
}

function renderAttendance(){let h=`<div class="section-head"><h2>Attendance log (${state.attendance.length} entries)</h2></div>`;if(state.attendance.length===0){return h+`<div class="card"><div class="empty"><i class="ti ti-clipboard-list" style="font-size:32px;display:block;margin-bottom:8px;opacity:0.3"></i>No attendance entries yet.</div></div>`;}[...state.attendance].reverse().forEach(a=>{h+=`<div class="att-entry"><div class="att-top"><span class="att-who"><i class="ti ti-user" style="font-size:13px"></i> ${a.empName}</span><span class="att-date">${a.date}</span></div><div class="att-dept">${a.titles||a.title||''} &middot; ${a.deptName}${a.trainer?' &middot; Trainer: '+a.trainer:''}</div><div class="att-item">${a.itemId} &mdash; ${a.itemLabel}</div>${a.notes?`<div style="font-size:12px;color:var(--text2);margin-top:4px">${a.notes}</div>`:''}</div>`;});return h;}

function titleSelectorHTML(selectedTitles,searchVal=''){
  const sv=searchVal.toLowerCase();
  const filtered=TITLES.filter(t=>!sv||t.toLowerCase().includes(sv));
  return`<input type="text" class="title-search" id="titleSearch" placeholder="Search titles..." value="${searchVal}" oninput="updateTitleSelector()" style="margin-bottom:8px">
  <div class="titles-selector" id="titlesSelector">${filtered.map(t=>`<span class="title-chip${selectedTitles.includes(t)?' selected':''}" onclick="toggleTitle('${t.replace(/'/g,"\\'")}',this)">${t}</span>`).join('')}</div>`;}

function updateTitleSelector(){
  const sv=document.getElementById('titleSearch').value;
  const selected=Array.from(document.querySelectorAll('.title-chip.selected')).map(c=>c.textContent);
  document.getElementById('titlesSelector').outerHTML=`<div class="titles-selector" id="titlesSelector">${TITLES.filter(t=>!sv||t.toLowerCase().includes(sv.toLowerCase())).map(t=>`<span class="title-chip${selected.includes(t)?' selected':''}" onclick="toggleTitle('${t.replace(/'/g,"\\'")}',this)">${t}</span>`).join('')}</div>`;}

function toggleTitle(t,el){el.classList.toggle('selected');}
function getSelectedTitles(){return Array.from(document.querySelectorAll('.title-chip.selected')).map(c=>c.textContent);}

function openAddEmployeeModal(){
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <h3><i class="ti ti-user-plus"></i> Add employee</h3>
    <div class="form-group"><label>Full name</label><input type="text" id="e-n" placeholder="First Last"></div>
    <div class="form-row">
      <div class="form-group"><label>Employee ID / PIN</label><input type="text" id="e-p" placeholder="e.g. 1001"></div>
      <div class="form-group"><label>Hire date</label><input type="date" id="e-h"></div>
    </div>
    <div class="form-group"><label>Job titles (select all that apply)</label>${titleSelectorHTML([])}</div>
    <div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveEmployee()"><i class="ti ti-check"></i> Add employee</button></div>
  </div></div>`;}

function openEditEmployeeModal(idx){
  const emp=state.employees[idx];if(!emp)return;
  const ts=getTitlesArr(emp);
  document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
    <h3><i class="ti ti-edit"></i> Edit employee</h3>
    <div class="form-group"><label>Full name</label><input type="text" id="e-n" value="${emp.name}"></div>
    <div class="form-row">
      <div class="form-group"><label>Employee ID / PIN</label><input type="text" id="e-p" value="${emp.pin||''}"></div>
      <div class="form-group"><label>Hire date</label><input type="date" id="e-h" value="${emp.hire||''}"></div>
    </div>
    <div class="form-group"><label>Job titles (select all that apply)</label>${titleSelectorHTML(ts)}</div>
    <div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="updateEmployee(${idx})"><i class="ti ti-check"></i> Save changes</button></div>
  </div></div>`;}

function saveEmployee(){
  const name=document.getElementById('e-n').value.trim();if(!name)return;
  const titles=getSelectedTitles();
  const dept=titles.length>0?(TITLE_DEPT[titles[0]]||'ADM'):'ADM';
  state.employees.push({name,titles,dept,pin:document.getElementById('e-p').value,hire:document.getElementById('e-h').value});
  saveState();closeModal();navigate('employees');}

function updateEmployee(idx){
  const name=document.getElementById('e-n').value.trim();if(!name)return;
  const titles=getSelectedTitles();
  const dept=titles.length>0?(TITLE_DEPT[titles[0]]||'ADM'):'ADM';
  state.employees[idx]={...state.employees[idx],name,titles,dept,pin:document.getElementById('e-p').value,hire:document.getElementById('e-h').value};
  saveState();closeModal();renderMain();}

function removeEmployee(idx){if(confirm('Remove this employee?')){state.employees.splice(idx,1);saveState();renderMain();}}

function openItemModal(itemId){const dept=Object.keys(ALL_ITEMS).find(d=>ALL_ITEMS[d].find(i=>i.id===itemId));const item=ALL_ITEMS[dept]?.find(i=>i.id===itemId);if(!item)return;const r=getRecord(itemId);document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()"><h3>${item.id} &mdash; ${item.item}</h3><div class="subtitle">${item.cat} &middot; ${item.freq} &middot; ${item.ref}</div><div class="form-row"><div class="form-group"><label>Status</label><select id="mi-s">${['Not Started','In Progress','Compliant','Overdue','N/A'].map(s=>`<option${r.status===s?' selected':''}>${s}</option>`).join('')}</select></div><div class="form-group"><label>Owner / responsible</label><input type="text" id="mi-o" value="${r.owner||''}" placeholder="Name or role"></div></div><div class="form-row"><div class="form-group"><label>Last review date</label><input type="date" id="mi-l" value="${r.lastReview}"></div><div class="form-group"><label>Next due date</label><input type="date" id="mi-n" value="${r.nextDue}"></div></div><div class="form-group"><label>Evidence / documentation</label><input type="text" id="mi-e" value="${r.evidence||''}" placeholder="Link or document reference"></div><div class="form-group"><label>Notes / corrective actions</label><input type="text" id="mi-nt" value="${r.notes||''}" placeholder="Optional notes"></div><div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveItem('${itemId}')"><i class="ti ti-check"></i> Save</button></div></div></div>`;}

function saveItem(id){setRecord(id,{status:document.getElementById('mi-s').value,lastReview:document.getElementById('mi-l').value,nextDue:document.getElementById('mi-n').value,owner:document.getElementById('mi-o').value,evidence:document.getElementById('mi-e').value,notes:document.getElementById('mi-nt').value});closeModal();renderMain();}

function openAttendanceModal(idx){const emp=state.employees[idx];if(!emp)return;const allItems=Object.values(ALL_ITEMS).flat();const ts=getTitlesArr(emp);document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()"><h3><i class="ti ti-clipboard-check"></i> Log in-service</h3><div class="subtitle">${emp.name} &middot; ${ts.join(', ')}</div><div class="form-group"><label>In-service / compliance item</label><select id="at-i">${allItems.map(i=>`<option value="${i.id}">${i.id} &mdash; ${i.item}</option>`).join('')}</select></div><div class="form-row"><div class="form-group"><label>Date completed</label><input type="date" id="at-d" value="${new Date().toISOString().slice(0,10)}"></div><div class="form-group"><label>Trainer / presenter</label><input type="text" id="at-t" placeholder="Name or title"></div></div><div class="form-group"><label>Notes</label><input type="text" id="at-n" placeholder="Optional notes"></div><div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveAttendance(${idx})"><i class="ti ti-check"></i> Save sign-off</button></div></div></div>`;}

function saveAttendance(idx){const emp=state.employees[idx];const itemId=document.getElementById('at-i').value;const allItems=Object.values(ALL_ITEMS).flat();const item=allItems.find(i=>i.id===itemId);const dept=DEPTS.find(d=>d.id===getPrimaryDept(emp));const date=document.getElementById('at-d').value;const ts=getTitlesArr(emp);state.attendance.push({empName:emp.name,titles:ts.join(', '),deptName:dept?dept.name:emp.dept,itemId,itemLabel:item?item.item:itemId,date,trainer:document.getElementById('at-t').value,notes:document.getElementById('at-n').value});setRecord(itemId,{status:'Compliant',lastReview:date});saveState();closeModal();renderMain();}

function closeModal(e){if(e&&e.target!==document.querySelector('.modal-overlay'))return;document.getElementById('modalContainer').innerHTML='';}

document.getElementById('addEmpBtn').onclick=openAddEmployeeModal;
renderNav();renderMain();
</script>
</body>
</html>
